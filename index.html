<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>記憶×暗算チャレンジ</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
background:#050a18;color:#e0f0ff;
font-family:'SF Mono','Fira Code',Consolas,monospace;
min-height:100vh;overflow-x:hidden;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.wrap{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#0a1628,#050a18 70%);position:relative;overflow:hidden}
.scan{position:fixed;inset:0;pointer-events:none;z-index:0}
.scan::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,255,224,.25),transparent);animation:sc 4s linear infinite}
.scan::after{content:’’;position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,224,.015) 2px,rgba(0,255,224,.015) 4px)}
.main{position:relative;z-index:1;padding:16px}
.main–center{display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{max-width:360px;margin:0 auto;width:100%}

.bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:12px;background:rgba(0,255,224,.05);border:1px solid rgba(0,255,224,.2);border-radius:8px}
.bar span{font-size:11px;color:#5a7a9a;letter-spacing:1px}
.bv{font-weight:800;font-size:18px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:320px;margin:0 auto;animation:gp 3s ease infinite}
.c{border-radius:8px;display:flex;align-items:center;justify-content:center;height:52px;font-size:20px;font-weight:800;background:rgba(10,25,50,.85);border:1px solid rgba(0,255,224,.08);color:#e0f0ff}
.c.hl{background:linear-gradient(135deg,rgba(0,255,200,.25),rgba(0,255,224,.1));border-color:#00ffe0;color:#00ffe0;animation:hg 1.5s ease infinite;text-shadow:0 0 12px #00ffe0}
.c.hd{color:transparent}

.btn{display:inline-block;background:0 0;border:2px solid #00ffe0;border-radius:8px;color:#00ffe0;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:3px;text-shadow:0 0 8px #00ffe0;box-shadow:0 0 16px rgba(0,255,224,.15);-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(0,255,224,.12)}
.btn.gr{border-color:#00ff88;color:#00ff88;text-shadow:0 0 8px #00ff88;box-shadow:0 0 16px rgba(0,255,136,.2)}
.btn.gr:active{background:rgba(0,255,136,.12)}

.inp{width:100%;background:rgba(0,255,224,.05);border:2px solid rgba(0,255,224,.25);border-radius:8px;padding:14px 16px;font-size:28px;font-weight:800;color:#00ffe0;outline:0;text-align:center;font-family:inherit;text-shadow:0 0 10px rgba(0,255,224,.3);margin-bottom:10px}
.inp:focus{border-color:#00ffe0}

.tag{background:rgba(0,255,224,.15);color:#00ffe0;font-weight:700;border-radius:6px;padding:4px 10px;font-size:14px;border:1px solid rgba(0,255,224,.2);display:inline-block;margin:3px}
.tc{text-align:center}
.dim{color:#5a7a9a}
.fi{animation:fi .5s ease}

@keyframes sc{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes gp{0%,100%{box-shadow:0 0 30px rgba(0,255,255,.05)}50%{box-shadow:0 0 50px rgba(0,255,255,.12)}}
@keyframes hg{0%,100%{box-shadow:0 0 12px rgba(0,255,200,.6),inset 0 0 12px rgba(0,255,200,.15)}50%{box-shadow:0 0 24px rgba(0,255,200,.9),inset 0 0 20px rgba(0,255,200,.25)}}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes cp{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>

</head>
<body>
<div class="wrap">
<div class="scan"></div>
<div id="app" class="main"></div>
</div>
<script>
(function(){
'use strict';

/* ====== AUDIO ====== */
var _ac = null;
function ac() {
if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
if (_ac.state === ‘suspended’) _ac.resume();
return _ac;
}
function tone(f, t, d, v) {
var c = ac(), o = c.createOscillator(), g = c.createGain();
o.type = t; o.frequency.value = f;
o.connect(g); g.connect(c.destination);
g.gain.setValueAtTime(v, c.currentTime);
g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
o.start(c.currentTime); o.stop(c.currentTime + d);
}
function sndTick() { tone(880,‘sine’,.15,.3); }
function sndEnd() { tone(1200,‘square’,.4,.25); }
function sndOk() {
var c = ac(), fs = [523,659,784];
for (var i = 0; i < 3; i++) {
var o = c.createOscillator(), g = c.createGain();
o.type=‘sine’; o.frequency.value=fs[i];
o.connect(g); g.connect(c.destination);
g.gain.setValueAtTime(.2, c.currentTime+i*.12);
g.gain.exponentialRampToValueAtTime(.001, c.currentTime+i*.12+.2);
o.start(c.currentTime+i*.12); o.stop(c.currentTime+i*.12+.2);
}
}
function sndNg() { tone(200,‘sawtooth’,.5,.2); }

/* ====== UTIL ====== */
function shuf(a){var b=a.slice(),i=b.length,t,j;while(–i>0){j=Math.floor(Math.random()*(i+1));t=b[i];b[i]=b[j];b[j]=t;}return b;}
function rng(n){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
function esc(s){return String(s);}

/* ====== STATE ====== */
var P=‘title’, R=1, G=[], H=[], A=’’, CR=0, TL=3, RS=null, HI=0;
var _iv=null, _to=null, _sn=[];

function clr(){
clearInterval(_iv); _iv=null;
clearTimeout(_to); _to=null;
for(var i=0;i<_sn.length;i++)clearTimeout(_sn[i]);
_sn=[];
}

/* ====== GAME ====== */
function go(r){
clr(); R=r;
G=shuf(rng(20).map(function(i){return i+1;}));
H=shuf(rng(20)).slice(0,Math.min(r+1,20));
CR=0; for(var i=0;i<H.length;i++)CR+=G[H[i]];
A=’’; RS=null; TL=3; P=‘memo’; draw();

sndTick();
_sn.push(setTimeout(sndTick, 1000));
_sn.push(setTimeout(sndTick, 2000));

var t0=Date.now();
_iv=setInterval(function(){
var rem=Math.max(0,Math.ceil((3000-(Date.now()-t0))/1000));
if(rem!==TL){TL=rem;draw();}
},50);

_to=setTimeout(function(){
clr(); TL=0; sndEnd(); P=‘ans’; draw();
setTimeout(function(){var e=document.getElementById(‘ai’);if(e)e.focus();},100);
},3000);
}

function submit(){
var n=parseInt(A,10); if(isNaN(n))return;
if(n===CR){sndOk();RS=‘ok’;HI=Math.max(HI,R);}
else{sndNg();RS=‘ng’;HI=Math.max(HI,R-1);}
P=‘res’; draw();
}

/* ====== RENDER ====== */
var $=document.getElementById.bind(document);

function barH(){
return ‘<div class="bar">’
+’<span>ROUND <span class="bv" style="color:#00ffe0">’+R+’</span></span>’
+’<span>TARGET <span class="bv" style="color:#ffe100">’+Math.min(R+1,20)+’</span></span>’
+’<span>BEST <span class="bv" style="color:#ff00c8">’+HI+’</span></span></div>’;
}

function gridH(sn,sh){
var o=’<div class="grid">’;
for(var i=0;i<G.length;i++){
var on=H.indexOf(i)>=0;
var cls=‘c’;
if(sh&&on)cls+=’ hl’;
else if(!sn)cls+=’ hd’;
o+=’<div class="'+cls+'">’+(sn?esc(G[i]):’’)+’</div>’;
}
return o+’</div>’;
}

function draw(){
var app=$(‘app’);
var s=’’;

if(P===‘title’){
app.className=‘main main–center’;
s=’<div class="box tc fi">’
+’<div style="font-size:14px;letter-spacing:6px;color:#00ffe0;opacity:.6;margin-bottom:8px">NEURAL TRAINING SYSTEM</div>’
+’<h1 style="font-size:32px;font-weight:900;text-shadow:0 0 30px rgba(0,255,224,.3);margin-bottom:4px">記憶×暗算</h1>’
+’<div style="color:#ff00c8;font-size:14px;font-weight:600;letter-spacing:4px;margin-bottom:32px">C H A L L E N G E</div>’
+’<div style="background:rgba(10,25,50,.85);border:1px solid rgba(0,255,224,.2);border-radius:12px;padding:20px 24px;max-width:300px;margin:0 auto 28px;text-align:left;font-size:13px;line-height:2;color:#5a7a9a">’
+’<div><span style="color:#00ffe0">▸</span> 4×5グリッドに1〜20が配置</div>’
+’<div><span style="color:#00ffe0">▸</span> 光る数字を<span style="color:#ffe100;font-weight:700">3秒</span>で記憶</div>’
+’<div><span style="color:#00ffe0">▸</span> 合計値を回答</div>’
+’<div><span style="color:#00ffe0">▸</span> ラウンドごとに光る数が増加</div></div>’;
if(HI>0) s+=’<div class="dim" style="font-size:12px;margin-bottom:16px">HIGH SCORE: <span style="color:#ff00c8;font-weight:800;font-size:18px">’+HI+’</span></div>’;
s+=’<button class="btn" id="startB" style="padding:14px 48px;font-size:16px;letter-spacing:4px">INITIALIZE</button></div>’;
}

else if(P===‘memo’){
app.className=‘main’;
var tc=TL<=1?’#ff3366’:’#00ffe0’;
s=’<div class="box">’+barH()
+’<div class="tc" style="margin-bottom:14px">’
+’<div style="display:inline-flex;align-items:center;gap:10px;background:rgba(0,255,224,.08);border:1px solid rgba(0,255,224,.2);border-radius:8px;padding:8px 24px">’
+’<span class="dim" style="font-size:11px;letter-spacing:2px">TIME</span>’
+’<span style="color:'+tc+';font-weight:900;font-size:28px;font-variant-numeric:tabular-nums;text-shadow:0 0 16px '+tc+';animation:cp 1s ease infinite">’+TL+’</span>’
+’</div></div>’
+gridH(true,true)
+’<p class="dim tc" style="font-size:11px;margin-top:14px;letter-spacing:1px">MEMORIZE HIGHLIGHTED VALUES</p></div>’;
}

else if(P===‘ans’){
app.className=‘main’;
s=’<div class="box fi" id="ansP">’+barH()
+’<div class="tc" style="margin-bottom:24px">’
+’<div style="font-size:12px;letter-spacing:3px;color:#00ffe0;opacity:.6;margin-bottom:8px">INPUT REQUIRED</div>’
+’<p style="font-size:18px;font-weight:700;margin-bottom:4px">光った数字の合計は？</p>’
+’<p class="dim" style="font-size:12px">画面タップで入力開始</p></div>’
+’<div style="max-width:280px;margin:0 auto">’
+’<input type="number" inputmode="numeric" id="ai" class="inp" placeholder="0" value="'+esc(A)+'">’
+’<button class="btn" id="subB" style="width:100%;padding:12px;font-size:15px">SUBMIT</button>’
+’</div></div>’;
}

else if(P===‘res’){
app.className=‘main’;
var ok=RS===‘ok’, co=ok?’#00ff88’:’#ff3366’;
var sorted=H.slice().sort(function(a,b){return G[a]-G[b];});
var tags=’’; for(var i=0;i<sorted.length;i++)tags+=’<span class="tag">’+esc(G[sorted[i]])+’</span>’;

```
s='<div class="box fi">'+barH()
+'<div class="tc" style="margin-bottom:20px">'
+'<div style="font-size:14px;letter-spacing:4px;color:'+co+';font-weight:800;text-shadow:0 0 20px '+co+';margin-bottom:4px">'+(ok?'[ CORRECT ]':'[ FAILED ]')+'</div>'
+'<div style="background:rgba(10,25,50,.85);border:1px solid '+co+'40;border-radius:12px;padding:20px;margin:16px auto;display:inline-block;min-width:200px">'
+'<div class="dim" style="font-size:11px;letter-spacing:2px;margin-bottom:4px">ANSWER</div>'
+'<div style="color:#00ff88;font-size:36px;font-weight:900;text-shadow:0 0 16px #00ff88">'+CR+'</div>';
if(!ok) s+='<div class="dim" style="font-size:11px;letter-spacing:2px;margin-top:12px;margin-bottom:4px">YOUR INPUT</div><div style="color:#ff3366;font-size:24px;font-weight:700">'+esc(A)+'</div>';
s+='</div></div>'
+'<div class="tc" style="margin-bottom:16px"><div class="dim" style="font-size:11px;letter-spacing:2px;margin-bottom:8px">HIGHLIGHTED VALUES</div>'
+'<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px">'+tags+'</div></div>';
if(!ok){
s+='<div class="tc" style="margin-bottom:20px;padding:12px;background:rgba(255,0,200,.05);border:1px solid rgba(255,0,200,.2);border-radius:8px">'
+'<div class="dim" style="font-size:11px;letter-spacing:2px">REACHED ROUND</div>'
+'<div style="color:#ff00c8;font-weight:900;font-size:28px;text-shadow:0 0 12px #ff00c8">'+R+'</div>'
+'<div class="dim" style="font-size:11px;margin-top:4px">HIGH SCORE: <span style="color:#ff00c8;font-weight:800">'+HI+'</span></div></div>';
}
s+='<div style="display:flex;justify-content:center">';
if(ok) s+='<button class="btn gr" id="nextB" style="padding:12px 32px;font-size:14px">NEXT →</button>';
else s+='<button class="btn" id="retryB" style="padding:12px 32px;font-size:14px">RETRY</button>';
s+='</div></div>';
```

}

app.innerHTML=s;
bind();
}

/* ====== EVENTS ====== */
function bind(){
var startB=$(‘startB’), subB=$(‘subB’), nextB=$(‘nextB’), retryB=$(‘retryB’), ai=$(‘ai’), ansP=$(‘ansP’);
if(startB) startB.onclick=function(){ ac(); R=1; go(1); };
if(ai){
ai.oninput=function(e){ A=e.target.value; };
ai.onkeydown=function(e){ if(e.key===‘Enter’) submit(); };
}
if(subB) subB.onclick=function(e){ e.stopPropagation(); submit(); };
if(ansP) ansP.onclick=function(){ var e=$(‘ai’); if(e)e.focus(); };
if(nextB) nextB.onclick=function(){ go(R+1); };
if(retryB) retryB.onclick=function(){ ac(); R=1; go(1); };
}

draw();
})();
</script>

</body>
</html>
