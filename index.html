<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>記憶×暗算チャレンジ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050a18;font-family:'SF Mono','Fira Code','Consolas',monospace;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
@keyframes gridPulse{0%,100%{box-shadow:0 0 30px rgba(0,255,255,.05)}50%{box-shadow:0 0 50px rgba(0,255,255,.12)}}
@keyframes hlGlow{0%,100%{box-shadow:0 0 12px rgba(0,255,200,.6),inset 0 0 12px rgba(0,255,200,.15)}50%{box-shadow:0 0 24px rgba(0,255,200,.9),inset 0 0 20px rgba(0,255,200,.25)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes counterPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;
const DISPLAY_TIME=3000;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function genGrid(){return shuffle(Array.from({length:20},(_,i)=>i+1))}
function pick(g,c){return shuffle(Array.from({length:20},(_,i)=>i)).slice(0,c)}

let audioCtx=null;
function ctx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playTick(){try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=“sine”;o.frequency.value=880;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.15);o.start(c.currentTime);o.stop(c.currentTime+.15)}catch(e){}}
function playFinal(){try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=“square”;o.frequency.value=1200;g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.4);o.start(c.currentTime);o.stop(c.currentTime+.4)}catch(e){}}
function playCorrect(){try{const c=ctx();[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=“sine”;o.frequency.value=f;g.gain.setValueAtTime(.2,c.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+i*.12+.2);o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.2)})}catch(e){}}
function playWrong(){try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=“sawtooth”;o.frequency.value=200;g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.5);o.start(c.currentTime);o.stop(c.currentTime+.5)}catch(e){}}

const bg=”#050a18”,cardBg=“rgba(10,25,50,0.85)”,cyan=”#00ffe0”,cyanDim=“rgba(0,255,224,0.15)”,magenta=”#ff00c8”,green=”#00ff88”,red=”#ff3366”,yellow=”#ffe100”,textP=”#e0f0ff”,textS=”#5a7a9a”,brd=“rgba(0,255,224,0.2)”;

function App(){
const[phase,setPhase]=useState(“title”);
const[round,setRound]=useState(1);
const[grid,setGrid]=useState([]);
const[hl,setHl]=useState([]);
const[ans,setAns]=useState(””);
const[correct,setCorrect]=useState(0);
const[timeLeft,setTimeLeft]=useState(3);
const[result,setResult]=useState(null);
const[best,setBest]=useState(0);
const[high,setHigh]=useState(0);
const tRef=useRef(null),cRef=useRef(null),iRef=useRef(null),ltRef=useRef(3);

const startRound=useCallback(r=>{
const g=genGrid(),c=Math.min(r+1,20),h=pick(g,c),s=h.reduce((a,i)=>a+g[i],0);
setGrid(g);setHl(h);setCorrect(s);setAns(””);setResult(null);setTimeLeft(3);ltRef.current=3;setPhase(“memorize”);
playTick();
if(cRef.current)clearInterval(cRef.current);
const st=Date.now();
cRef.current=setInterval(()=>{const el=Date.now()-st,rem=Math.max(0,3-Math.floor(el/1000));setTimeLeft(rem);if(rem<ltRef.current&&rem>0){ltRef.current=rem;playTick()}},50);
if(tRef.current)clearTimeout(tRef.current);
tRef.current=setTimeout(()=>{if(cRef.current)clearInterval(cRef.current);setTimeLeft(0);playFinal();setPhase(“answer”)},DISPLAY_TIME);
},[]);

useEffect(()=>()=>{if(tRef.current)clearTimeout(tRef.current);if(cRef.current)clearInterval(cRef.current)},[]);

const handleStart=()=>{ctx();setRound(1);setBest(0);startRound(1)};
const handleSubmit=()=>{const n=parseInt(ans,10);if(isNaN(n))return;if(n===correct){playCorrect();setResult(“correct”);setPhase(“result”);setBest(p=>Math.max(p,round));setHigh(p=>Math.max(p,round))}else{playWrong();setResult(“wrong”);setPhase(“result”);setBest(p=>Math.max(p,round-1));setHigh(p=>Math.max(p,round-1))}};
const handleNext=()=>{if(result===“correct”){const n=round+1;setRound(n);startRound(n)}};
const handleKey=e=>{if(e.key===“Enter”)handleSubmit()};
const tapFocus=()=>{if(iRef.current){iRef.current.focus();iRef.current.click()}};

const ps={minHeight:“100vh”,background:`radial-gradient(ellipse at 50% 0%,#0a1628 0%,${bg} 70%)`,fontFamily:”‘SF Mono’,‘Fira Code’,‘Consolas’,monospace”,padding:16,position:“relative”,overflow:“hidden”};
const scan=<div style={{position:“fixed”,top:0,left:0,right:0,bottom:0,pointerEvents:“none”,zIndex:0}}><div style={{position:“absolute”,top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${cyan}40,transparent)`,animation:“scanline 4s linear infinite”}}/><div style={{position:“absolute”,inset:0,backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,224,0.015) 2px,rgba(0,255,224,0.015) 4px)`}}/></div>;
const bar=<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:“8px 12px”,marginBottom:12,background:“rgba(0,255,224,0.05)”,border:`1px solid ${brd}`,borderRadius:8}}><div style={{fontSize:11,color:textS,letterSpacing:1}}>ROUND <span style={{color:cyan,fontWeight:800,fontSize:18}}>{round}</span></div><div style={{fontSize:11,color:textS,letterSpacing:1}}>TARGET <span style={{color:yellow,fontWeight:800,fontSize:18}}>{Math.min(round+1,20)}</span></div><div style={{fontSize:11,color:textS,letterSpacing:1}}>BEST <span style={{color:magenta,fontWeight:800,fontSize:18}}>{high}</span></div></div>;

const renderGrid=(sn,sh)=><div style={{display:“grid”,gridTemplateColumns:“repeat(4,1fr)”,gap:6,maxWidth:320,margin:“0 auto”,animation:“gridPulse 3s ease infinite”}}>{grid.map((n,i)=>{const isH=hl.includes(i);return<div key={i}style={{background:sh&&isH?`linear-gradient(135deg,rgba(0,255,200,0.25),rgba(0,255,224,0.1))`:cardBg,border:sh&&isH?`1px solid ${cyan}`:`1px solid rgba(0,255,224,0.08)`,borderRadius:8,display:“flex”,alignItems:“center”,justifyContent:“center”,height:52,fontSize:20,fontWeight:800,color:sh&&isH?cyan:sn?textP:“transparent”,animation:sh&&isH?“hlGlow 1.5s ease infinite”:“none”,textShadow:sh&&isH?`0 0 12px ${cyan}`:“none”}}>{sn?n:””}</div>})}</div>;

if(phase===“title”)return<div style={{…ps,display:“flex”,alignItems:“center”,justifyContent:“center”}}>{scan}<div style={{textAlign:“center”,zIndex:1,animation:“fadeSlideUp 0.6s ease”}}><div style={{fontSize:14,letterSpacing:6,color:cyan,marginBottom:8,opacity:.6}}>NEURAL TRAINING SYSTEM</div><h1 style={{color:textP,fontSize:32,fontWeight:900,margin:“0 0 4px”,textShadow:`0 0 30px rgba(0,255,224,0.3)`}}>記憶×暗算</h1><div style={{color:magenta,fontSize:14,fontWeight:600,letterSpacing:4,margin:“0 0 32px”}}>C H A L L E N G E</div><div style={{background:cardBg,border:`1px solid ${brd}`,borderRadius:12,padding:“20px 24px”,marginBottom:28,maxWidth:300,margin:“0 auto 28px”,textAlign:“left”,fontSize:13,lineHeight:2,color:textS}}><div><span style={{color:cyan}}>▸</span> 4×5グリッドに1〜20が配置</div><div><span style={{color:cyan}}>▸</span> 光る数字を<span style={{color:yellow,fontWeight:700}}>3秒</span>で記憶</div><div><span style={{color:cyan}}>▸</span> 合計値を回答</div><div><span style={{color:cyan}}>▸</span> ラウンドごとに光る数が増加</div></div>{high>0&&<div style={{color:textS,fontSize:12,marginBottom:16}}>HIGH SCORE: <span style={{color:magenta,fontWeight:800,fontSize:18}}>{high}</span></div>}<button onClick={handleStart}style={{background:“transparent”,color:cyan,border:`2px solid ${cyan}`,borderRadius:8,padding:“14px 48px”,fontSize:16,fontWeight:700,cursor:“pointer”,letterSpacing:4,textShadow:`0 0 10px ${cyan}`,boxShadow:`0 0 20px rgba(0,255,224,0.2),inset 0 0 20px rgba(0,255,224,0.05)`,transition:“all 0.2s”}}>INITIALIZE</button></div></div>;

if(phase===“memorize”)return<div style={ps}>{scan}<div style={{maxWidth:360,margin:“0 auto”,zIndex:1,position:“relative”}}>{bar}<div style={{textAlign:“center”,marginBottom:14}}><div style={{display:“inline-flex”,alignItems:“center”,gap:10,background:“rgba(0,255,224,0.08)”,border:`1px solid ${brd}`,borderRadius:8,padding:“8px 24px”}}><span style={{color:textS,fontSize:11,letterSpacing:2}}>TIME</span><span style={{color:timeLeft<=1?red:cyan,fontWeight:900,fontSize:28,fontVariantNumeric:“tabular-nums”,textShadow:`0 0 16px ${timeLeft<=1?red:cyan}`,animation:“counterPulse 1s ease infinite”}}>{timeLeft}</span></div></div>{renderGrid(true,true)}<p style={{color:textS,fontSize:11,textAlign:“center”,marginTop:14,letterSpacing:1}}>MEMORIZE HIGHLIGHTED VALUES</p></div></div>;

if(phase===“answer”)return<div style={ps}onClick={tapFocus}>{scan}<div style={{maxWidth:360,margin:“0 auto”,zIndex:1,position:“relative”,animation:“fadeSlideUp 0.4s ease”}}>{bar}<div style={{textAlign:“center”,marginBottom:24}}><div style={{fontSize:12,letterSpacing:3,color:cyan,marginBottom:8,opacity:.6}}>INPUT REQUIRED</div><p style={{color:textP,fontSize:18,fontWeight:700,margin:“0 0 4px”}}>光った数字の合計は？</p><p style={{color:textS,fontSize:12,margin:0}}>画面タップで入力開始</p></div><div style={{maxWidth:280,margin:“0 auto”}}><input ref={iRef}type=“number”inputMode=“numeric”value={ans}onChange={e=>setAns(e.target.value)}onKeyDown={handleKey}placeholder=“0”style={{width:“100%”,boxSizing:“border-box”,background:“rgba(0,255,224,0.05)”,border:`2px solid ${cyan}40`,borderRadius:8,padding:“14px 16px”,fontSize:28,fontWeight:800,color:cyan,outline:“none”,textAlign:“center”,fontFamily:“inherit”,textShadow:`0 0 10px rgba(0,255,224,0.3)`,marginBottom:10}}/><button onClick={e=>{e.stopPropagation();handleSubmit()}}style={{width:“100%”,background:“transparent”,color:cyan,border:`2px solid ${cyan}`,borderRadius:8,padding:“12px”,fontSize:15,fontWeight:700,cursor:“pointer”,letterSpacing:3,textShadow:`0 0 8px ${cyan}`,boxShadow:`0 0 16px rgba(0,255,224,0.15)`}}>SUBMIT</button></div></div></div>;

if(phase===“result”){const ok=result===“correct”,ac=ok?green:red;return<div style={ps}>{scan}<div style={{maxWidth:360,margin:“0 auto”,zIndex:1,position:“relative”,animation:“fadeSlideUp 0.4s ease”}}>{bar}<div style={{textAlign:“center”,marginBottom:20}}><div style={{fontSize:14,letterSpacing:4,color:ac,fontWeight:800,marginBottom:4,textShadow:`0 0 20px ${ac}`}}>{ok?”[ CORRECT ]”:”[ FAILED ]”}</div><div style={{background:cardBg,border:`1px solid ${ac}40`,borderRadius:12,padding:20,margin:“16px auto”,display:“inline-block”,minWidth:200}}><div style={{color:textS,fontSize:11,letterSpacing:2,marginBottom:4}}>ANSWER</div><div style={{color:green,fontSize:36,fontWeight:900,textShadow:`0 0 16px ${green}`}}>{correct}</div>{!ok&&<><div style={{color:textS,fontSize:11,letterSpacing:2,marginTop:12,marginBottom:4}}>YOUR INPUT</div><div style={{color:red,fontSize:24,fontWeight:700}}>{ans}</div></>}</div></div><div style={{textAlign:“center”,marginBottom:16}}><div style={{color:textS,fontSize:11,letterSpacing:2,marginBottom:8}}>HIGHLIGHTED VALUES</div><div style={{display:“flex”,flexWrap:“wrap”,justifyContent:“center”,gap:6}}>{[…hl].sort((a,b)=>grid[a]-grid[b]).map(i=><span key={i}style={{background:cyanDim,color:cyan,fontWeight:700,borderRadius:6,padding:“4px 10px”,fontSize:14,border:`1px solid ${brd}`}}>{grid[i]}</span>)}</div></div>{!ok&&<div style={{textAlign:“center”,marginBottom:20,padding:12,background:“rgba(255,0,200,0.05)”,border:`1px solid rgba(255,0,200,0.2)`,borderRadius:8}}><div style={{color:textS,fontSize:11,letterSpacing:2}}>REACHED ROUND</div><div style={{color:magenta,fontWeight:900,fontSize:28,textShadow:`0 0 12px ${magenta}`}}>{round}</div><div style={{color:textS,fontSize:11,marginTop:4}}>HIGH SCORE: <span style={{color:magenta,fontWeight:800}}>{high}</span></div></div>}<div style={{display:“flex”,gap:8,justifyContent:“center”}}>{ok?<button onClick={handleNext}style={{background:“transparent”,color:green,border:`2px solid ${green}`,borderRadius:8,padding:“12px 32px”,fontSize:14,fontWeight:700,cursor:“pointer”,letterSpacing:3,textShadow:`0 0 8px ${green}`,boxShadow:`0 0 16px rgba(0,255,136,0.2)`}}>NEXT →</button>:<button onClick={handleStart}style={{background:“transparent”,color:cyan,border:`2px solid ${cyan}`,borderRadius:8,padding:“12px 32px”,fontSize:14,fontWeight:700,cursor:“pointer”,letterSpacing:3,textShadow:`0 0 8px ${cyan}`,boxShadow:`0 0 16px rgba(0,255,224,0.2)`}}>RETRY</button>}</div></div></div>}
return null;
}
ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
